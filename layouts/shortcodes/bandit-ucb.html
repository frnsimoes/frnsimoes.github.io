<div class="bandit-sim">
<style>
  .bandit-sim {
    font-family: ui-monospace, 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: #111;
    margin: 2em 0;
    border-top: 1px solid #ddd;
    padding-top: 1.25em;
  }

  .bandit-sim * { box-sizing: border-box; margin: 0; padding: 0; }

  .bandit-phase {
    font-size: 12px;
    color: #111;
    text-align: center;
    margin-bottom: 1em;
    min-height: 1.6em;
    font-style: italic;
  }

  .bandit-arms-row {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 1em;
  }

  .bandit-arm-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 6px;
  }

  .bandit-arm-col.b-selected .b-arm-letter { font-weight: 700; }
  .bandit-arm-col.b-selected .b-arm-bar-fill { background: #111; }

  .b-arm-letter {
    font-size: 11px;
    margin-bottom: 5px;
    color: #111;
  }

  .b-arm-bar-wrap {
    width: 28px;
    height: 64px;
    background: #fff;
    border: 1px solid #ccc;
    position: relative;
    border-radius: 1px;
  }

  .b-arm-bar-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #888;
    transition: height 0.2s;
    height: 0%;
    border-radius: 0 0 1px 1px;
  }

  .b-arm-avg {
    font-size: 11px;
    color: #111;
    margin-top: 5px;
  }

  .b-arm-bonus {
    font-size: 10px;
    color: #555;
    margin-top: 1px;
  }

  .b-arm-score {
    font-size: 10px;
    font-weight: 600;
    color: #111;
    margin-top: 1px;
  }

  .bandit-sim canvas {
    width: 100%;
    display: block;
    margin-bottom: 0.6em;
  }

  .bandit-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75em;
  }

  .bandit-controls a {
    color: #00e;
    text-decoration: none;
    cursor: pointer;
    margin-right: 1em;
  }

  .bandit-controls a:hover { text-decoration: underline; }
  .bandit-controls a.b-dim { color: #aaa; }

  .b-status {
    color: #111;
    font-size: 11px;
    text-align: right;
  }

  .b-regret-num { color: #993333; }

  .bandit-foot {
    font-size: 11px;
    color: #111;
    font-style: italic;
    text-align: center;
    border-top: 1px solid #ddd;
    padding-top: 0.75em;
  }
</style>

<div class="bandit-phase" id="buPhase">&nbsp;</div>

<div class="bandit-arms-row" id="buArmsRow"></div>

<canvas id="buChart" height="130"></canvas>

<div class="bandit-bottom">
  <div class="bandit-controls">
    <a id="buPlayBtn" onclick="buTogglePlay()">&#9654; play</a>
    <a onclick="buStepOnce()">step</a>
    <a onclick="buReset()">reset</a>
    <a onclick="buReset(true)" class="b-dim">clear all</a>
  </div>
  <div class="b-status">
    round <span id="buRound">0</span>/100 &nbsp;&middot;&nbsp;
    regret <span class="b-regret-num" id="buRegret">0.0</span><span id="buRegretRate"></span>
  </div>
</div>

<div class="bandit-foot" id="buFoot">true payout rates are hidden.</div>

<script>
(function() {
  const BU_ARMS = [
    { name: 'A', trueRate: 0.30 },
    { name: 'B', trueRate: 0.70 },
    { name: 'C', trueRate: 0.45 },
    { name: 'D', trueRate: 0.55 },
  ];
  const BU_MAX = 100;

  let buRound = 0;
  let buTotalReward = 0;
  let buOptimalReward = 0;
  let buRegretVal = 0;
  let buHistory = [];
  let buPlaying = false;
  let buInterval = null;
  let buArmState = [];
  let buRegretAtSettle = null;
  let buStoredRuns = [];

  function buInitArms() {
    buArmState = BU_ARMS.map(a => ({
      ...a, pulls: 0, totalReward: 0, avgReward: 0,
      ucbScore: Infinity, bonus: Infinity, lastSelected: false,
    }));
    buRegretAtSettle = null;
  }

  window.buReset = function(clearStored) {
    buStopPlay();
    if (buHistory.length > 0) buStoredRuns.push(buHistory.slice());
    if (clearStored) buStoredRuns = [];
    buRound = 0; buTotalReward = 0; buOptimalReward = 0; buRegretVal = 0; buHistory = [];
    buInitArms();
    buRender();
  };

  function buPickArm() {
    for (let i = 0; i < buArmState.length; i++)
      if (buArmState[i].pulls === 0) return i;
    let best = 0, bestScore = -Infinity;
    const total = buArmState.reduce((s, a) => s + a.pulls, 0);
    for (let i = 0; i < buArmState.length; i++) {
      const bonus = Math.sqrt((2 * Math.log(total)) / buArmState[i].pulls);
      const score = buArmState[i].avgReward + bonus;
      buArmState[i].bonus = bonus; buArmState[i].ucbScore = score;
      if (score > bestScore) { bestScore = score; best = i; }
    }
    return best;
  }

  function buPullArm(idx) {
    const arm = buArmState[idx];
    const reward = Math.random() < arm.trueRate ? 1 : 0;
    arm.pulls++; arm.totalReward += reward; arm.avgReward = arm.totalReward / arm.pulls;
    const bestRate = Math.max(...BU_ARMS.map(a => a.trueRate));
    buTotalReward += reward; buOptimalReward += bestRate;
    buRegretVal = buOptimalReward - buTotalReward;
    buHistory.push(buRegretVal);
    const total = buArmState.reduce((s, a) => s + a.pulls, 0);
    for (let i = 0; i < buArmState.length; i++) {
      if (buArmState[i].pulls > 0) {
        buArmState[i].bonus = Math.sqrt((2 * Math.log(total)) / buArmState[i].pulls);
        buArmState[i].ucbScore = buArmState[i].avgReward + buArmState[i].bonus;
      }
    }
    buArmState.forEach((a, i) => a.lastSelected = (i === idx));
    buRound++;
  }

  window.buStepOnce = function() {
    if (buRound >= BU_MAX) return;
    buPullArm(buPickArm());
    buRender();
  };

  window.buTogglePlay = function() {
    if (buPlaying) { buStopPlay(); return; }
    if (buRound >= BU_MAX) buReset();
    buPlaying = true;
    document.getElementById('buPlayBtn').innerHTML = '&#9646;&#9646; pause';
    buInterval = setInterval(() => {
      if (buRound >= BU_MAX) { buStopPlay(); return; }
      buStepOnce();
    }, 80);
  };

  function buStopPlay() {
    buPlaying = false;
    document.getElementById('buPlayBtn').innerHTML = '&#9654; play';
    if (buInterval) clearInterval(buInterval);
    buInterval = null;
  }

  function buRenderPhase() {
    const el = document.getElementById('buPhase');

    if (buRound === 0) {
      el.textContent = 'every round: pick the arm with highest avg + bonus.';
      return;
    }

    const sel = buArmState.find(a => a.lastSelected);
    if (!sel) return;

    const allPulled = buArmState.every(a => a.pulls > 0);

    if (!allPulled) {
      el.textContent = 'arm ' + sel.name + ': first pass - each arm needs one pull before scoring. exploration cost so far: ' + buRegretVal.toFixed(1) + '.';
      return;
    }

    if (buRegretAtSettle === null) buRegretAtSettle = buRegretVal;

    const topAvgIdx = buArmState.reduce((best, _, i) =>
      buArmState[i].avgReward > buArmState[best].avgReward ? i : best, 0);
    const selIdx = buArmState.indexOf(sel);
    const isRisk = selIdx !== topAvgIdx;

    if (isRisk) {
      el.textContent = 'arm ' + sel.name + ': avg ' + sel.avgReward.toFixed(2)
        + ' lower than best, but bonus ' + sel.bonus.toFixed(2) + ' wins - taking a risk.';
    } else {
      el.textContent = 'arm ' + sel.name + ': best known avg (' + sel.avgReward.toFixed(2)
        + ') + bonus. exploiting.';
    }
  }

  function buRenderArms() {
    const maxPulls = Math.max(1, ...buArmState.map(a => a.pulls));
    const done = buRound >= BU_MAX;
    const bestTrueIdx = BU_ARMS.reduce((b, a, i) => a.trueRate > BU_ARMS[b].trueRate ? i : b, 0);
    const container = document.getElementById('buArmsRow');
    container.innerHTML = buArmState.map((arm, i) => {
      const heightPct = (arm.pulls / maxPulls) * 100;
      const avgStr = arm.pulls > 0 ? arm.avgReward.toFixed(2) : '-';
      const bonusHtml = arm.pulls > 0
        ? `<div class="b-arm-bonus">+${arm.bonus.toFixed(2)}</div>
           <div class="b-arm-score">${arm.ucbScore.toFixed(2)}</div>`
        : '';
      const trueHtml = done
        ? `<div class="b-arm-avg" style="${i === bestTrueIdx ? 'color:#336633;font-weight:600' : 'color:#aaa'}">${arm.trueRate.toFixed(2)}</div>`
        : '';

      return `<div class="bandit-arm-col ${arm.lastSelected ? 'b-selected' : ''}">
        <div class="b-arm-letter">${arm.name}</div>
        <div class="b-arm-bar-wrap">
          <div class="b-arm-bar-fill" style="height:${heightPct}%"></div>
        </div>
        <div class="b-arm-avg">${avgStr}</div>
        ${bonusHtml}
        ${trueHtml}
      </div>`;
    }).join('');
  }

  function buRender() {
    buRenderPhase();
    buRenderArms();

    document.getElementById('buRound').textContent = buRound;
    document.getElementById('buRegret').textContent = buRegretVal.toFixed(1);
    document.getElementById('buRegretRate').textContent =
      buRound > 0 ? ' (' + (buRegretVal / buRound).toFixed(2) + '/round)' : '';

    if (buRound >= BU_MAX) {
      document.getElementById('buFoot').textContent = 'true payout rates revealed. B was the best arm.';
    }

    buRenderChart();
  }

  function buRenderChart() {
    const canvas = document.getElementById('buChart');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const pad = { top: 6, right: 20, bottom: 18, left: 28 };
    const pw = w - pad.left - pad.right, ph = h - pad.top - pad.bottom;
    ctx.clearRect(0, 0, w, h);

    const bestRate = Math.max(...BU_ARMS.map(a => a.trueRate));
    const worstRate = Math.min(...BU_ARMS.map(a => a.trueRate));
    const maxLinear = (bestRate - worstRate) * BU_MAX;
    const yMax = Math.max(maxLinear, 10);

    [0, 0.5, 1].forEach(t => {
      const y = pad.top + ph * t;
      ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
      ctx.fillStyle = '#111'; ctx.font = '9px ui-monospace, monospace'; ctx.textAlign = 'right';
      ctx.fillText(Math.round(yMax * (1 - t)), pad.left - 3, y + 3);
    });

    ctx.fillStyle = '#111'; ctx.font = '9px ui-monospace, monospace';
    [[0, 'left'], [0.5, 'center'], [1, 'right']].forEach(([t, align]) => {
      ctx.textAlign = align;
      ctx.fillText(Math.round(BU_MAX * t), pad.left + pw * t, h - 2);
    });

    // linear worst case reference
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top + ph);
    ctx.lineTo(pad.left + pw, pad.top + ph - (maxLinear / yMax) * ph);
    ctx.stroke(); ctx.setLineDash([]);

    // stored runs (grey)
    buStoredRuns.forEach(hist => {
      if (!hist || hist.length < 2) return;
      ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < hist.length; i++) {
        const x = pad.left + (i / BU_MAX) * pw;
        const y = pad.top + ph - (hist[i] / yMax) * ph;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    });

    // current regret curve
    if (buHistory.length > 1) {
      ctx.strokeStyle = '#993333'; ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < buHistory.length; i++) {
        const x = pad.left + (i / BU_MAX) * pw;
        const y = pad.top + ph - (buHistory[i] / yMax) * ph;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      if (buHistory.length >= BU_MAX) {
        const lastY = pad.top + ph - (buHistory[buHistory.length - 1] / yMax) * ph;
        ctx.fillStyle = '#993333'; ctx.font = '9px ui-monospace, monospace'; ctx.textAlign = 'left';
        ctx.fillText('UCB', pad.left + pw + 3, lastY + 3);
      }
    }
  }

  buInitArms(); buRender();
  window.addEventListener('resize', buRenderChart);
})();
</script>
</div>
