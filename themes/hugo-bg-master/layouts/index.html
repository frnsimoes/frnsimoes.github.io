{{ define "main" }}
<content>
	<!-- Render latest 5 posts section -->
	<!-- <h4>Latest Posts</h4> -->
	<ul class="blog-posts">
		{{ $posts := where .Site.RegularPages "Section" "posts" }}
		{{ range $posts }}
		<li>
			<span>
				<i>
					<time datetime='{{ .Date.Format "2006-01-02" }}' pubdate>
						{{ .Date.Format (default "02 Jan, 2006" .Site.Params.dateFormat) }}
					</time>
				</i>
			</span>
			<a href="{{ .Permalink }}">{{ .Title }}</a>
		</li>
		{{ else }}
		<li>
			No posts yet
		</li>
		{{ end }}
	</ul>
