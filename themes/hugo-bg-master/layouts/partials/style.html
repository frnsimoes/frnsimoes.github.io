<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background-color: #ffffff;
        color: #000;
        line-height: 1.6;
        margin: 0;
        padding: 0;
    }

    header {
        padding: 0.3em 1em 0;
    }

    main, footer {
        max-width: 50em;
        margin: 0 auto;
        padding: 0 1em;
    }


    a { color: #0000ee; }
    a:visited { color: #551a8b; }

    img { max-width: 100%; }

    pre code {
        display: block;
        padding: 15px;
        white-space: pre-wrap;
        overflow-x: auto;
        background-color: #f2f2f2;

    }

    code {
        font-size: 0.9em;
    }

    table {
        font-size: 0.85em;
        border-collapse: collapse;
        overflow-x: auto;
        display: block;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 0.3em 0.6em;
    }

    main h2 { font-size: 1em; margin-top: 0; margin-bottom: 0.2em; }

    .header-container { margin-bottom: 0.3em; }

    ul.blog-posts {
        list-style-type: none;
        padding-left: 0;
        margin-top: 0.2em;
    }

    ul.blog-posts li { margin-bottom: 2px; }
    ul.blog-posts li a { text-decoration: none; }

    details summary {
        font-family: monospace;
        font-size: 0.9em;
        cursor: pointer;
    }

    details .details-content {
        background-color: #f2f2f2;
        padding: 0.75em 1em;
        margin-top: 0.5em;
        font-size: 0.83em;
        line-height: 1.6;
    }

    details.qa {
        margin: 1.25rem 0;
    }

    details.qa summary {
        cursor: pointer;
        font-weight: 700;
        list-style: none;
    }

    details.qa summary::-webkit-details-marker {
        display: none;
    }

    details.qa summary::before {
        content: "▸ ";
    }

    details.qa[open] summary::before {
        content: "▾ ";
    }

    details.qa .answer {
        margin-top: 0.75rem;
    }
