  <style>
:root {
	--width: 720px;
	--font-main: Verdana, sans-serif;
	--font-secondary: Verdana, sans-serif;
	--font-scale: 1em;
	--background-color: #fff;
	--heading-color: #222;
	--text-color: #444;
	--link-color: #3273dc;
	--visited-color:  #8b6fcb;
	--code-background-color: #f2f2f2;
	--code-color: #222;
	--blockquote-color: #222;
}

  body {
	  font-family: Verdana, sans-serif;
	  margin: auto;
	  padding: 20px;
	  max-width: 720px;
	  text-align: left;
	  background-color: #fff;
	  word-wrap: break-word;
	  overflow-wrap: break-word;
	  line-height: 1.5;
	  color: #444;
	  border: 2px solid #0d6cff;
	  box-sizing: border-box;
  }

  h1, h2, h3, h4, h5, h6 {
	  font-family: var(--font-main);
	  color: var(--heading-color);
  }

  a {
	  color: var(--link-color);
	  cursor: pointer;
	  text-decoration: none;
  }

  a:hover {
	  text-decoration: underline; 
  }

  nav a {
	  margin-right: 8px;
  }

  strong, b {
	  color: var(--heading-color);
  }

  button {
	  margin: 0;
	  cursor: pointer;
  }

  time {
	  font-family: monospace;
	  font-style: normal;
	  font-size: 15px;
  }

  main {
	  line-height: 1.6;
  }

  table {
	  width: 100%;
  }

  hr {
	  border: 0;
	  border-top: 1px dashed;
  }

  img {
	  max-width: 100%;
  }

  pre code { 
	  color: #222;
	  display: block;
	  padding: 15px;
	  white-space: pre-wrap;
	  font-size: 11px;
	  overflow-x: auto;
	  overflow: auto;
	  background-color: #f7f7f7;
	   
	   
	  border: #cccccc;
	  border-style: solid;
	  border-width: 1px;
  } 

  code {
	  display: inline-block;
	  white-space: no-wrap;
	  background-color: #f7f7f7;
	  font-size: 0.8em;
	  line-height: 1.5em;
	  border: 1px solid #cccccc;
	  padding: 0 2px;
	  margin: -1px 0px;
	   
  }

   
   
   
   
   
   
   
   
   
   
   
   
   
   


  div.highlight pre {
	  background-color: #f2f2f2;
	  color: #222; 
  } 

  div.highlight code {
	  background-color: #f2f2f2;
	  color: #222; 
  } 

  footer {
	  padding: 25px 0;
	  text-align: center;
  }

  .title:hover {
	  text-decoration: none;
  }

  .title h1 {
	  font-size: 1.5em;
  }

  .inline {
	  width: auto !important;
  }

  .highlight, .code {
	  padding: 1px 15px;
	  background-color: var(--code-background-color);
	  color: var(--code-color);
	  border-radius: 3px;
	  margin-block-start: 1em;
	  margin-block-end: 1em;
	  overflow-x: auto;
  }

   
  ul.blog-posts {
	  list-style-type: none;
	  padding: unset;
  }

  ul.blog-posts li {
	  display: flex;
  }

  ul.blog-posts li span {
	  flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
	  color: var(--visited-color);
  }
</style>
